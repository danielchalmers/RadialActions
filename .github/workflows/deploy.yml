name: Release and deploy

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  deploy:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Validate release tag
      shell: bash
      run: |
        if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "Release tags must match vX.Y.Z"
          exit 1
        fi

        echo "RELEASE_TAG=$GITHUB_REF_NAME" >> "$GITHUB_ENV"
        echo "RELEASE_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
    
    - uses: ./.github/actions/full-build
      with:
        version: ${{ env.RELEASE_VERSION }}

    # The release is created alongside the tag in GitHub; this workflow only replaces its artifacts.
    - name: Attach release artifacts
      uses: ncipollo/release-action@v1.21.0
      with:
        tag: ${{ env.RELEASE_TAG }}
        artifacts: "publish/*.zip,publish/*.msi"
        allowUpdates: true
        removeArtifacts: true
        omitBodyDuringUpdate: true
